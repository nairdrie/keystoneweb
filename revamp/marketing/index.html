<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keystone Web — Marketing UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300..900&family=Geist+Mono:wght@400..600&display=swap">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--ksw-font-sans); }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="FeatureGrid.jsx"></script>
<script type="text/babel" src="TemplateShowcase.jsx"></script>
<script type="text/babel" src="PricingCards.jsx"></script>
<script type="text/babel" src="FAQ.jsx"></script>
<script type="text/babel" src="CTABlock.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
const App = () => {
  const [page, setPage] = React.useState("home");

  const onNav = (id) => {
    if (id === "pricing") setPage("pricing");
    else if (id === "templates") setPage("templates");
    else if (id === "home") setPage("home");
    else if (id === "get-started") setPage("home");
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  return (
    <div data-screen-label={page === "home" ? "01 Home" : page === "pricing" ? "02 Pricing" : "03 Templates"}>
      <Header active={page} onNav={onNav} />

      {page === "home" && (
        <>
          <Hero onCTA={() => onNav("pricing")} />
          <FeatureGrid />
          <TemplateShowcase />
          <CTABlock />
        </>
      )}

      {page === "pricing" && (
        <>
          <PricingCards />
          <FAQ />
          <CTABlock title="Still have questions?" body="Book a free 15-minute call. No pressure, no sales pitch." cta="Book a Call" />
        </>
      )}

      {page === "templates" && (
        <>
          <section style={{ padding: "96px 24px 48px", textAlign: "center" }}>
            <h1 style={{ fontSize: "clamp(40px, 5vw, 64px)", fontWeight: 900, color: "#000", letterSpacing: "-0.02em", lineHeight: 1.05, margin: "0 0 16px" }}>
              Templates that <em style={{ color: "#fe4545" }}>actually</em> sell.
            </h1>
            <p style={{ fontSize: 18, color: "#475569", maxWidth: 640, margin: "0 auto" }}>
              Eight starting points. Every one customizable from top to bottom.
            </p>
          </section>
          <TemplateShowcase />
          <CTABlock />
        </>
      )}

      <Footer />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
