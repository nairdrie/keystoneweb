<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keystone Web — Builder UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300..900&family=Geist+Mono:wght@400..600&family=Inter:wght@300..900&family=Playfair+Display:wght@400..900&family=Space+Grotesk:wght@400..700&family=DM+Serif+Display&display=swap">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #f1f5f9; font-family: var(--ksw-font-sans); height: 100%; }
  #root { height: 100vh; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="EditorIcons.jsx"></script>
<script type="text/babel" src="PalettePicker.jsx"></script>
<script type="text/babel" src="AIBuilderChat.jsx"></script>
<script type="text/babel" src="FloatingSidebar.jsx"></script>
<script type="text/babel" src="EditorBanner.jsx"></script>
<script type="text/babel" src="SitePreview.jsx"></script>
<script type="text/babel" src="OnboardingWizard.jsx"></script>

<script type="text/babel">
const App = () => {
  const [phase, setPhase] = React.useState("onboarding"); // onboarding | editor
  const [sidebarOpen, setSidebarOpen] = React.useState(true);
  const [editMode, setEditMode] = React.useState(true);
  const [viewport, setViewport] = React.useState("desktop");
  const [pages, setPages] = React.useState(["Home", "About", "Services", "Contact"]);
  const [currentPage, setCurrentPage] = React.useState("Home");
  const [saving, setSaving] = React.useState(false);
  const [isPublished, setIsPublished] = React.useState(false);
  const [isPro, setIsPro] = React.useState(false);

  const [site, setSite] = React.useState({
    name: "Hargrove Plumbing",
    tagline: "Plumbing fixed right, the first time.",
    city: "Boise, ID",
  });
  const [selectedPalette, setSelectedPalette] = React.useState("Brand");
  const [customColors, setCustomColors] = React.useState({ primary: "#fe4545", secondary: "#0f172a", accent: "#f8fafc" });
  const [selectedFont, setSelectedFont] = React.useState("Geist, sans-serif");

  const [messages, setMessages] = React.useState([]);
  const [busy, setBusy] = React.useState(false);

  const palette = selectedPalette === "custom"
    ? customColors
    : (PALETTES.find(p => p.name === selectedPalette) || PALETTES[1]);

  const handleSiteChange = (k, v) => setSite((s) => ({ ...s, [k]: v }));
  const handleCustomColor = (k, v) => setCustomColors((c) => ({ ...c, [k]: v }));

  const handleSend = (text) => {
    setMessages((m) => [...m, { role: "user", text }]);
    setBusy(true);
    setTimeout(() => {
      // Fake AI response with a tool call
      let response = "Done! Take a look at the preview.";
      let tools = [{ label: "edit_section", status: "done" }];
      const t = text.toLowerCase();
      if (t.includes("warmer") || t.includes("color")) {
        setSelectedPalette("Sunset");
        response = "Switched to a warmer Sunset palette. The reds and ambers should feel more inviting.";
        tools = [{ label: "set_palette('Sunset')", status: "done" }];
      } else if (t.includes("bold") || t.includes("hero")) {
        setSelectedFont("'DM Serif Display', serif");
        response = "Bumped up the hero with a more editorial typeface. Want me to push the headline weight even further?";
        tools = [{ label: "set_font", status: "done" }, { label: "rewrite_hero", status: "done" }];
      } else if (t.includes("testimonial") || t.includes("review")) {
        response = "Added a testimonials section after the services block — three customer quotes with star ratings.";
        tools = [{ label: "add_section('testimonials')", status: "done" }];
      } else if (t.includes("services") || t.includes("copy")) {
        response = "Tightened the services copy. The tone is friendlier and each card now has a price hint.";
        tools = [{ label: "rewrite_copy('services')", status: "done" }];
      }
      setMessages((m) => [...m, { role: "assistant", text: response, tools }]);
      setBusy(false);
    }, 1300);
  };

  const handleSave = () => {
    setSaving(true);
    setTimeout(() => setSaving(false), 800);
  };

  const handlePublish = () => setIsPublished(true);

  if (phase === "onboarding") {
    return (
      <OnboardingWizard onComplete={(data) => {
        setSite((s) => ({ ...s, name: data.name || s.name, city: data.city || s.city }));
        setMessages([
          { role: "assistant",
            text: `Built a starter site for ${data.name || "your business"}. I picked the Brand palette and Geist font — feel free to tweak anything from the panel on the left.`,
            tools: [
              { label: "select_template", status: "done" },
              { label: "generate_copy", status: "done" },
              { label: "set_palette('Brand')", status: "done" },
            ],
          },
        ]);
        setPhase("editor");
      }} />
    );
  }

  return (
    <div data-screen-label="01 Editor" style={{ display: "flex", flexDirection: "column", height: "100vh", background: "#f1f5f9" }}>
      <EditorBanner
        sidebarOpen={sidebarOpen}
        onToggleSidebar={() => setSidebarOpen(!sidebarOpen)}
        currentPage={currentPage} pages={pages}
        onPageChange={setCurrentPage}
        onCreatePage={() => {
          const n = prompt("New page name?");
          if (n) { setPages([...pages, n]); setCurrentPage(n); }
        }}
        editMode={editMode} onSetEditMode={setEditMode}
        onUndo={() => {}} onRedo={() => {}} canUndo={true} canRedo={false}
        onSave={handleSave} saving={saving}
        onPublish={handlePublish} isPublished={isPublished}
      />

      <div style={{ position: "relative", flex: 1, minHeight: 0, overflow: "hidden" }}>
        <FloatingSidebar
          open={sidebarOpen} onClose={() => setSidebarOpen(false)}
          site={site} onSiteChange={handleSiteChange}
          selectedPalette={selectedPalette} onSelectPalette={setSelectedPalette}
          customColors={customColors} onCustomColorChange={handleCustomColor}
          selectedFont={selectedFont} onSelectFont={setSelectedFont}
          messages={messages} onSend={handleSend} busy={busy} isPro={isPro}
          isPublished={isPublished} publishedUrl={`https://${site.name.toLowerCase().replace(/\s+/g,"-")}.keystoneweb.app`}
        />

        {/* Viewport toggle (floats top-right) */}
        <div style={{
          position: "absolute", top: 18, right: 24, zIndex: 40,
          display: "flex", gap: 4, background: "#fff",
          border: "1px solid #e2e8f0", borderRadius: 9999, padding: 3,
          boxShadow: "0 4px 6px -1px rgb(0 0 0 / 0.08)",
        }}>
          <button onClick={() => setViewport("desktop")} style={{
            padding: "6px 12px", border: 0, borderRadius: 9999, cursor: "pointer",
            background: viewport === "desktop" ? "#fe4545" : "transparent",
            color: viewport === "desktop" ? "#fff" : "#475569",
            display: "flex", alignItems: "center", gap: 5, fontFamily: "inherit",
            fontSize: 12, fontWeight: 600,
          }}><EMonitor size={13} /> Desktop</button>
          <button onClick={() => setViewport("mobile")} style={{
            padding: "6px 12px", border: 0, borderRadius: 9999, cursor: "pointer",
            background: viewport === "mobile" ? "#fe4545" : "transparent",
            color: viewport === "mobile" ? "#fff" : "#475569",
            display: "flex", alignItems: "center", gap: 5, fontFamily: "inherit",
            fontSize: 12, fontWeight: 600,
          }}><ESmartphone size={13} /> Mobile</button>
        </div>

        {/* Canvas */}
        <div style={{
          height: "100%", overflowY: "auto",
          paddingLeft: sidebarOpen ? 376 : 12,
          paddingRight: 12, paddingTop: 64, paddingBottom: 32,
          transition: "padding-left .25s",
        }}>
          <div style={{
            background: "#fff", borderRadius: 12,
            boxShadow: "0 10px 25px -5px rgb(0 0 0 / 0.10)",
            border: "1px solid #e2e8f0",
            maxWidth: viewport === "mobile" ? 460 : "100%",
            margin: "0 auto", overflow: "hidden",
            padding: viewport === "mobile" ? 24 : 0,
          }}>
            <SitePreview site={site} palette={palette} font={selectedFont}
              editMode={editMode} viewport={viewport} />
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
