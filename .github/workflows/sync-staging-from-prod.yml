name: Sync staging from prod

# Clones prod Supabase → staging Supabase nightly. Includes:
#   - public schema (schema + data, drop-and-recreate)
#   - auth.users / auth.identities data (prod users become staging users)
#   - storage.buckets / storage.objects metadata
#   - storage bucket *contents* via rclone S3 sync
#
# Staging is gated by Vercel SSO, so PII at rest is only visible to you.
# Cron runs on the default branch only — won't fire until this is merged to main.

on:
  schedule:
    - cron: '0 8 * * *'   # 03:00 America/Toronto (08:00 UTC) daily
  workflow_dispatch: {}    # "Run workflow" button in the Actions tab

concurrency:
  group: sync-staging-from-prod
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PROD_DB_URL: ${{ secrets.PROD_DB_URL }}
      STAGING_DB_URL: ${{ secrets.STAGING_DB_URL }}
    steps:
      - name: Sanity check — refuse to run if prod == staging
        run: |
          if [ "$PROD_DB_URL" = "$STAGING_DB_URL" ]; then
            echo "::error::PROD_DB_URL and STAGING_DB_URL are identical. Aborting."
            exit 1
          fi
          if [ -z "$PROD_DB_URL" ] || [ -z "$STAGING_DB_URL" ]; then
            echo "::error::Missing PROD_DB_URL or STAGING_DB_URL secret."
            exit 1
          fi
          # Print shape (not value) so we can diagnose URL-parse failures without
          # leaking credentials. Connection strings should start with postgres(ql)://.
          echo "PROD_DB_URL    length=${#PROD_DB_URL}    starts=$(printf '%s' "$PROD_DB_URL" | head -c 13)"
          echo "STAGING_DB_URL length=${#STAGING_DB_URL} starts=$(printf '%s' "$STAGING_DB_URL" | head -c 13)"
          case "$PROD_DB_URL" in
            postgres://*|postgresql://*) ;;
            *) echo "::error::PROD_DB_URL does not start with postgres:// or postgresql://"; exit 1 ;;
          esac
          case "$STAGING_DB_URL" in
            postgres://*|postgresql://*) ;;
            *) echo "::error::STAGING_DB_URL does not start with postgres:// or postgresql://"; exit 1 ;;
          esac

      - name: Install postgres 17 client + rclone
        run: |
          set -euo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | \
            sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17 rclone
          # Ubuntu ships pg_dump 16 on the default PATH; put 17 ahead so the
          # dump/restore steps actually use it.
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Verify pg client version
        run: |
          which pg_dump
          pg_dump --version
          which psql
          psql --version

      - name: Dump prod
        run: |
          set -euo pipefail
          # public: full schema + data. No --clean/--if-exists — we restore into
          # a freshly-created empty schema, so cleanup statements aren't needed
          # (and pg_dump's DROP TRIGGER IF EXISTS ... ON <table> errors if the
          # table doesn't exist — the IF EXISTS guards only the trigger).
          # Don't pass --no-privileges — we want prod's GRANTs on the public
          # schema (USAGE for anon/authenticated, etc.) to carry over, so
          # Supabase's API exposure matches prod.
          pg_dump "$PROD_DB_URL" \
            --schema=public \
            --no-owner \
            --file=public.sql

          # auth: data only. We can't use --disable-triggers here because the
          # pooler user doesn't own auth.users (it's supabase_auth_admin's).
          # That's OK — we dropped public schema first, which cascade-dropped
          # public.handle_new_user() and its trigger on auth.users, so no
          # triggers fire during this COPY.
          pg_dump "$PROD_DB_URL" \
            --data-only \
            --table=auth.users \
            --table=auth.identities \
            --no-owner --no-privileges \
            --file=auth-data.sql

          # storage metadata: data only (rclone handles file bytes). Same
          # ownership reasoning as auth — no --disable-triggers.
          pg_dump "$PROD_DB_URL" \
            --data-only \
            --table=storage.buckets \
            --table=storage.objects \
            --no-owner --no-privileges \
            --file=storage-data.sql

          ls -lh *.sql

      - name: Restore to staging
        run: |
          set -euo pipefail
          # Wipe everything we're about to restore. Public is dropped wholesale
          # (CASCADE takes its triggers/functions/FKs with it). The dump will
          # recreate the schema itself with prod's GRANTs. Auth/storage schemas
          # are Supabase-managed, so we only TRUNCATE their data tables.
          psql "$STAGING_DB_URL" -v ON_ERROR_STOP=1 <<'SQL'
          BEGIN;
          DROP SCHEMA IF EXISTS public CASCADE;
          TRUNCATE auth.identities, auth.users CASCADE;
          TRUNCATE storage.objects, storage.buckets CASCADE;
          COMMIT;
          SQL

          # Order: auth first so public's FKs to auth.users(id) validate when
          # ADD CONSTRAINT fires at the end of public.sql. Storage last.
          psql "$STAGING_DB_URL" -v ON_ERROR_STOP=1 -f auth-data.sql
          psql "$STAGING_DB_URL" -v ON_ERROR_STOP=1 -f public.sql
          psql "$STAGING_DB_URL" -v ON_ERROR_STOP=1 -f storage-data.sql

      - name: Sync storage bucket contents (prod → staging)
        env:
          RCLONE_CONFIG_PROD_TYPE: s3
          RCLONE_CONFIG_PROD_PROVIDER: Other
          RCLONE_CONFIG_PROD_ENDPOINT: ${{ secrets.PROD_S3_ENDPOINT }}
          RCLONE_CONFIG_PROD_ACCESS_KEY_ID: ${{ secrets.PROD_S3_KEY }}
          RCLONE_CONFIG_PROD_SECRET_ACCESS_KEY: ${{ secrets.PROD_S3_SECRET }}
          RCLONE_CONFIG_PROD_REGION: us-east-1
          RCLONE_CONFIG_PROD_FORCE_PATH_STYLE: "true"
          RCLONE_CONFIG_STAGING_TYPE: s3
          RCLONE_CONFIG_STAGING_PROVIDER: Other
          RCLONE_CONFIG_STAGING_ENDPOINT: ${{ secrets.STAGING_S3_ENDPOINT }}
          RCLONE_CONFIG_STAGING_ACCESS_KEY_ID: ${{ secrets.STAGING_S3_KEY }}
          RCLONE_CONFIG_STAGING_SECRET_ACCESS_KEY: ${{ secrets.STAGING_S3_SECRET }}
          RCLONE_CONFIG_STAGING_REGION: us-east-1
          RCLONE_CONFIG_STAGING_FORCE_PATH_STYLE: "true"
        run: |
          set -euo pipefail
          # --fast-list batches listings; --checksum skips identical files.
          rclone sync prod: staging: --fast-list --checksum --stats 30s -v

      - name: Summary
        if: always()
        run: |
          echo "### Sync finished" >> "$GITHUB_STEP_SUMMARY"
          echo "- DB: public (full), auth (users+identities), storage (metadata)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Storage: rclone sync from prod to staging" >> "$GITHUB_STEP_SUMMARY"
